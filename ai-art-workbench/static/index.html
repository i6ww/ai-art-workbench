<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 画图工作台</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 左侧边栏 - 工具列表 -->
        <aside class="sidebar-left">
            <div class="sidebar-header">
                <button class="btn-new-chat" onclick="clearChat()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    新建对话
                </button>
            </div>
            <div class="tools-section">
                <div class="section-title">创作工具</div>
                <div class="tool-list">
                    <div class="tool-item active" data-tool="text2image" onclick="switchTool('text2image')">
                        <div class="tool-icon" style="background: linear-gradient(135deg, #ff6b6b, #ee5a6f);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </div>
                        <div class="tool-info">
                            <div class="tool-name">AI绘图</div>
                            <div class="tool-desc">文字描述生成图片</div>
                        </div>
                    </div>
                    <div class="tool-item" data-tool="image2image" onclick="switchTool('image2image')">
                        <div class="tool-icon" style="background: linear-gradient(135deg, #4ecdc4, #44a08d);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </div>
                        <div class="tool-info">
                            <div class="tool-name">图生图</div>
                            <div class="tool-desc">上传图片进行AI处理</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="history-section">
                <div class="section-title">最近对话</div>
                <div class="history-list" id="historyList">
                    <!-- 历史记录动态添加 -->
                </div>
            </div>
        </aside>

        <!-- 中间主区域 - 对话/生成区域 -->
        <main class="main-area">
            <header class="main-header">
                <div class="header-title">
                    <h1>AI 画图工作台</h1>
                    <span class="header-subtitle">并发生成 · 4K渲染 · 本地存储</span>
                </div>
                <div class="header-actions">
                    <button class="btn-header" id="themeToggle" onclick="toggleTheme()" title="切换主题">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-message" id="welcomeMessage">
                    <div class="welcome-icon">🎨</div>
                    <h2>AI 画图工作台</h2>
                    <p>输入描述，让AI为您生成精美图片</p>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <!-- 消息动态添加 -->
                </div>
            </div>

            <!-- 底部输入区域 -->
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-toolbar" id="inputToolbar" style="display: none;">
                        <div class="upload-preview" id="uploadPreview">
                            <img id="previewImg" src="" alt="预览">
                            <button class="btn-remove-img" onclick="removeUploadedImage()">×</button>
                        </div>
                    </div>
                    <div class="input-box">
                        <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)" style="display: none;">
                        <button class="btn-attach" onclick="document.getElementById('imageInput').click()" id="attachBtn" style="display: none;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                            </svg>
                        </button>
                        <textarea id="messageInput" placeholder="描述您想要生成的画面..." rows="1"></textarea>
                        <button class="btn-send" onclick="sendMessage()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- 右侧边栏 - 绘图设置 -->
        <aside class="sidebar-right">
            <div class="settings-header">
                <h3>⚙️ 绘图设置</h3>
            </div>
            <div class="settings-content">
                <!-- API设置 -->
                <div class="setting-group">
                    <label class="setting-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        API Key
                    </label>
                    <input type="password" id="apiKey" placeholder="输入您的 API Key" class="setting-input">
                    <button class="btn-save" onclick="saveApiKey()">保存</button>
                </div>

                <!-- 接口类型 -->
                <div class="setting-group">
                    <label class="setting-label">接口类型</label>
                    <div class="btn-group">
                        <button class="btn-group-item active">Banana</button>
                        <button class="btn-group-item">OpenAI</button>
                    </div>
                </div>

                <!-- 选择模型 -->
                <div class="setting-group">
                    <label class="setting-label">选择模型</label>
                    <select id="modelSelect" class="setting-select">
                        <!-- 动态填充 -->
                    </select>
                </div>

                <!-- 分辨率 -->
                <div class="setting-group">
                    <label class="setting-label">分辨率</label>
                    <div class="resolution-options">
                        <button class="resolution-btn" data-res="1K" onclick="setResolution('1K')">1K</button>
                        <button class="resolution-btn active" data-res="2K" onclick="setResolution('2K')">2K</button>
                        <button class="resolution-btn" data-res="4K" onclick="setResolution('4K')">4K</button>
                    </div>
                </div>

                <!-- 宽高比 -->
                <div class="setting-group">
                    <label class="setting-label">多宽比 (默认 Auto)</label>
                    <div class="ratio-grid">
                        <button class="ratio-btn" data-ratio="1:1" onclick="setRatio('1:1')">
                            <div class="ratio-preview ratio-1-1"></div>
                            <span>1:1</span>
                        </button>
                        <button class="ratio-btn active" data-ratio="16:9" onclick="setRatio('16:9')">
                            <div class="ratio-preview ratio-16-9"></div>
                            <span>16:9</span>
                        </button>
                        <button class="ratio-btn" data-ratio="9:16" onclick="setRatio('9:16')">
                            <div class="ratio-preview ratio-9-16"></div>
                            <span>9:16</span>
                        </button>
                        <button class="ratio-btn" data-ratio="4:3" onclick="setRatio('4:3')">
                            <div class="ratio-preview ratio-4-3"></div>
                            <span>4:3</span>
                        </button>
                        <button class="ratio-btn" data-ratio="3:4" onclick="setRatio('3:4')">
                            <div class="ratio-preview ratio-3-4"></div>
                            <span>3:4</span>
                        </button>
                    </div>
                </div>

                <!-- 流式传输 -->
                <div class="setting-group">
                    <label class="setting-toggle">
                        <input type="checkbox" id="streamToggle" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">流式传输</span>
                    </label>
                </div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
